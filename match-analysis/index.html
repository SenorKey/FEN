    <!--
        React from CDN — no npm, no build step.
        See original comments in match-analysis.jsx for details
        on why Babel is needed for in-browser JSX compilation.
    -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin
        src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

    <!--
        ── FILE LOAD ORDER ──

        Because there's no bundler, each file is a separate
        <script type="text/babel"> tag that Babel compiles and
        executes in sequence. All vars land in global scope, so
        later files can reference globals defined by earlier ones.

        1. app.jsx        — Theme (C), utilities (uid), hooks
                             (useAutoSave, useMatchClock), shared
                             components (Field, ToggleGroup, Section,
                             Label, Spacer), ExportMenu, generateReport,
                             and the main App shell.

        2. pitch.jsx      — boardReducer, ActionMenu, PitchSVG,
                             TacticalBoard. Uses C, uid from (1).

        3. scouting-form.jsx — ScoutingForm. Uses C, Field,
                             ToggleGroup, Section, Label, Spacer
                             from (1).

        4. timeline.jsx   — MatchTimeline. Uses C, uid, Field
                             from (1).

        App (defined in step 1) references TacticalBoard, ScoutingForm,
        and MatchTimeline in its render function — but that function
        isn't called until the mount script below runs, by which time
        all four files have executed and those globals exist.
    -->
    <script type="text/babel" src="/js/app.jsx"></script>
    <script type="text/babel" src="/js/pitch.jsx"></script>
    <script type="text/babel" src="/js/scouting-form.jsx"></script>
    <script type="text/babel" src="/js/timeline.jsx"></script>

    <!-- Mount the React app -->
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('match-analysis-root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
